<body class="bg-gradient-to-br from-slate-50 via-white to-indigo-50/30 min-h-screen antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useCallback, useRef } = React;
        const {
            ComposedChart, Line, Area, XAxis, YAxis, CartesianGrid,
            Tooltip: RechartsTooltip, ResponsiveContainer, Legend, ReferenceLine,
            PieChart, Pie, Cell, BarChart, Bar
        } = Recharts;

        // SVG Icons
        const svgPaths = {

            Home: <><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>,
            Landmark: <><line x1="3" y1="22" x2="21" y2="22"/><line x1="6" y1="18" x2="6" y2="11"/><line x1="10" y1="18" x2="10" y2="11"/><line x1="14" y1="18" x2="14" y2="11"/><line x1="18" y1="18" x2="18" y2="11"/><polygon points="12 2 20 7 4 7"/></>,
            AlertCircle: <><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>,
            ArrowRightLeft: <><path d="m16 3 4 4-4 4"/><path d="M20 7H4"/><path d="m8 21-4-4 4-4"/><path d="M4 17h16"/></>,
            ArrowDownCircle: <><circle cx="12" cy="12" r="10"/><path d="m8 12 4 4 4-4"/><path d="M12 8v8"/></>,
            Lightbulb: <><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></>,
            MapPin: <><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></>,
            Compass: <><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></>,
            Wallet: <><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></>,
            DollarSign: <><line x1="12" y1="2" x2="12" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></>,
            Download: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>,
            Upload: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></>,
            Calendar: <><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>,
            RefreshCw: <><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></>,
            Zap: <><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></>,
            PieChartIcon: <><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></>,
            BarChartIcon: <><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></>,
        };
        const Icon = ({ name, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {svgPaths[name]}
            </svg>
        );

        const InfoTooltip = ({ text }) => (
            <span className="group relative flex items-center justify-center ml-1.5 cursor-help inline-flex">
                <Icon name="Info" size={15} className="text-slate-400 hover:text-indigo-500 transition-colors" />
                <span className="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 w-64 p-3 bg-slate-800 text-white text-xs rounded-xl shadow-xl opacity-0 group-hover:opacity-100 transition-opacity z-50 pointer-events-none font-normal leading-relaxed">
                    {text}
                    <span className="absolute top-full left-1/2 -translate-x-1/2 border-[6px] border-transparent border-t-slate-800"></span>
                </span>
            </span>
        );

        const InputGroup = ({ label, value, onChange, type = "number", prefix = "", suffix = "", tooltip, step = "1", min = "0", max, disabled = false }) => (
            <div className="flex flex-col mb-3.5">
                <label className="flex items-center text-xs font-semibold text-slate-600 mb-1.5 tracking-wide uppercase">
                    {label} {tooltip && <InfoTooltip text={tooltip} />}
                </label>
                <div className="relative flex items-center group">
                    {prefix && <span className="absolute left-3.5 text-slate-400 font-medium text-sm">{prefix}</span>}
                    <input type={type} className={`w-full py-2.5 px-3.5 border border-slate-200 rounded-xl bg-white focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-400 outline-none transition-all text-sm font-medium text-slate-700 placeholder:text-slate-300 disabled:bg-slate-50 disabled:text-slate-400 ${prefix ? 'pl-9' : ''} ${suffix ? 'pr-10' : ''}`} value={value} onChange={(e) => onChange(e.target.value)} step={step} min={min} max={max} disabled={disabled} />
                    {suffix && <span className="absolute right-3.5 text-slate-400 font-medium text-sm">{suffix}</span>}
                </div>
            </div>
        );

        const ToggleSwitch = ({ checked, onChange, label, tooltip }) => (
            <div className="flex items-center justify-between py-1.5">
                <span className="text-xs font-semibold text-slate-600 flex items-center gap-1">{label} {tooltip && <InfoTooltip text={tooltip} />}</span>
                <label className="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" className="sr-only peer" checked={checked} onChange={onChange} />
                    <div className="w-9 h-5 bg-slate-200 rounded-full peer peer-checked:bg-indigo-500 peer-focus:ring-2 peer-focus:ring-indigo-500/30 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:after:translate-x-full"></div>
                </label>
            </div>
        );

        const LumpSumSection = ({ newLumpYear, setNewLumpYear, newLumpAmount, setNewLumpAmount, newLumpReason, setNewLumpReason, lumpSums, addLumpSum, removeLumpSum }) => (
            <div className="border-t pt-4 mt-4">
                <h3 className="text-sm font-bold text-slate-700 mb-2 flex items-center gap-1.5"><Icon name="Calendar" size={15} className="text-amber-500" /> Scheduled Lump Sums</h3>
                <div className="flex gap-2 flex-wrap items-end">
                    <div className="w-20"><InputGroup label="Year" value={newLumpYear} onChange={setNewLumpYear} min="0" max="30" /></div>
                    <div className="flex-1 min-w-[100px]"><InputGroup label="Amount" value={newLumpAmount} onChange={setNewLumpAmount} prefix="$" /></div>
                    <div className="flex-1 min-w-[120px]"><label className="text-xs font-semibold text-slate-600 mb-1.5 tracking-wide uppercase block">Reason</label><input type="text" className="w-full py-2.5 px-3.5 border border-slate-200 rounded-xl bg-white focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-400 outline-none text-sm font-medium text-slate-700 placeholder:text-slate-300" value={newLumpReason} onChange={(e) => setNewLumpReason(e.target.value)} placeholder="e.g., World Tour" /></div>
                    <button onClick={addLumpSum} className="mb-3.5 p-2.5 bg-indigo-500 hover:bg-indigo-600 text-white rounded-xl shadow-sm"><Icon name="Plus" size={18} /></button>
                </div>
                {lumpSums.length > 0 && (
                    <div className="space-y-1.5 mt-2 max-h-40 overflow-y-auto">
                        {lumpSums.map(ls => (
                            <div key={ls.id} className="flex justify-between items-center bg-slate-50 p-2.5 rounded-lg text-xs border border-slate-100">
                                <span className="font-semibold text-slate-700">Yr {ls.year}: ${Number(ls.amount).toLocaleString()}</span>
                                <span className="text-slate-500 italic">{ls.reason}</span>
                                <button onClick={() => removeLumpSum(ls.id)} className="text-rose-400 hover:text-rose-600 transition-colors ml-2"><Icon name="Trash2" size={14} /></button>
                            </div>
                        ))}
                    </div>
                )}
            </div>
        );

        function App() {
            const [loanType, setLoanType] = useState('nomad');
            const [homeValue, setHomeValue] = useState(1200000);
            const [startingAge, setStartingAge] = useState(60);
            const [interestRate, setInterestRate] = useState(7.24);
            const [helocRate, setHelocRate] = useState(7.45);
            const [appreciationRate, setAppreciationRate] = useState(2.0);
            const [initialAdvance, setInitialAdvance] = useState(0);
            const [monthlyWithdrawal, setMonthlyWithdrawal] = useState(0);
            const [lumpSums, setLumpSums] = useState([
                { id: 1, year: 6, amount: 50000, reason: "World tour – business class" },
                { id: 2, year: 8, amount: 60000, reason: "African safari & luxury lodges" },
                { id: 3, year: 10, amount: 70000, reason: "Asia & Australia expedition" },
                { id: 4, year: 12, amount: 75000, reason: "European river cruises & villas" },
                { id: 5, year: 14, amount: 60000, reason: "Alaska & Canadian Rockies" },
                { id: 6, year: 16, amount: 50000, reason: "South America adventure" },
                { id: 7, year: 18, amount: 40000, reason: "Mediterranean cruise" },
                { id: 8, year: 20, amount: 40000, reason: "Family reunion resort" },
            ]);
            const [newLumpYear, setNewLumpYear] = useState(10);
            const [newLumpAmount, setNewLumpAmount] = useState(15000);
            const [newLumpReason, setNewLumpReason] = useState("Vacation / Car");
            const [principalPayments, setPrincipalPayments] = useState([]);
            const [newPayYear, setNewPayYear] = useState(1);
            const [newPayAmount, setNewPayAmount] = useState(20000);
            const [enableDownsize, setEnableDownsize] = useState(false);
            const [downsizeYear, setDownsizeYear] = useState(5);
            const [newHomeValue, setNewHomeValue] = useState(800000);
            const [enableTFSA, setEnableTFSA] = useState(true);
            const [tfsaRoomUser, setTfsaRoomUser] = useState(102000);
            const [tfsaRoomTammy, setTfsaRoomTammy] = useState(102000);
            const [tfsaReturnRate, setTfsaReturnRate] = useState(5.0);
            const [nomadExitYear, setNomadExitYear] = useState(3);
            const [nomadTruckBudget, setNomadTruckBudget] = useState(150000);
            const [nomadTravelYears, setNomadTravelYears] = useState(3);
            const [nomadYield, setNomadYield] = useState(5.0);
            const [nomadNewHomePrice, setNomadNewHomePrice] = useState(750000);
            const [pensionUser, setPensionUser] = useState(3316.36);
            const [pensionTammy, setPensionTammy] = useState(3031.36);
            const [inflationRate, setInflationRate] = useState(2.0);
            const [oasUserAmount, setOasUserAmount] = useState(800);
            const [oasTammyAmount, setOasTammyAmount] = useState(900);
            const [oasUserStartAge, setOasUserStartAge] = useState(65);
            const [oasTammyStartAge, setOasTammyStartAge] = useState(65);
            const [oasTaxRate, setOasTaxRate] = useState(15);
            const [enableNomadRM, setEnableNomadRM] = useState(true);
            const [nomadRmTriggerYear, setNomadRmTriggerYear] = useState(0);
            const [nomadRmMonthly, setNomadRmMonthly] = useState(0);
            const [hoveredData, setHoveredData] = useState(null);
            const [chartDomainLeft, setChartDomainLeft] = useState(0);
            const [chartDomainRight, setChartDomainRight] = useState(30);
            const fileInputRef = useRef(null);

            const [annualTfsaContribution, setAnnualTfsaContribution] = useState(7000);
            const [nonRegTaxRate, setNonRegTaxRate] = useState(25);
            const [avoidedHousingCost, setAvoidedHousingCost] = useState(800);

            // Use 'nomad' for simulation when dashboard is active
            const activeLoanType = loanType === 'dashboard' ? 'nomad' : loanType;

            // ── SIMULATION ENGINE ────────────────────────────
            const simulationData = useMemo(() => {
                const data = [];
                let currentHomeValue = Number(homeValue);
                const initialHomeValueTracker = Number(homeValue);
                let balance = Number(initialAdvance);
                let cumulativePrincipal = Number(initialAdvance);
                let totalOutofPocketInterest = 0;
                let cumulativeInterest = 0;
                let limitHit = false;
                let tfsaUser = 0;
                let tfsaTammy = 0;
                let taxableCash = 0;
                let leftoverCashAtDownsize = 0;
                let isNomadPhase = false;
                let hasSoldHouseForNomad = false;
                let downsizeOccurred = false;

                let roomUser = Number(tfsaRoomUser);
                let roomTammy = Number(tfsaRoomTammy);

                const rmR = Number(interestRate) / 100;
                const rmMonthlyRate = Math.pow(1 + rmR / 2, 1 / 6) - 1;
                const helocR = Number(helocRate) / 100;
                const helocMonthlyRate = helocR / 12;
                const monthlyAppreciation = Number(appreciationRate) / 100 / 12;
                const tfsaMonthlyReturn = (activeLoanType === 'nomad' ? Number(nomadYield) : Number(tfsaReturnRate)) / 100 / 12;
                const annualInflation = Number(inflationRate) / 100;
                const oasUserStartMonth = (Number(oasUserStartAge) - Number(startingAge)) * 12;
                const oasTammyStartMonth = (Number(oasTammyStartAge) - Number(startingAge)) * 12;
                const annTfsa = Number(annualTfsaContribution);
                const taxRate = Number(nonRegTaxRate) / 100;

                const fillTFSAs = (amount) => {
                    const roomUserNow = Math.max(0, roomUser - tfsaUser);
                    const roomTammyNow = Math.max(0, roomTammy - tfsaTammy);
                    const totalRoom = roomUserNow + roomTammyNow;
                    if (totalRoom <= 0 || amount <= 0) return amount;
                    const toUser = Math.min(roomUserNow, amount * (roomUserNow / totalRoom));
                    const toTammy = Math.min(roomTammyNow, amount * (roomTammyNow / totalRoom));
                    tfsaUser += toUser;
                    tfsaTammy += toTammy;
                    return amount - toUser - toTammy;
                };

                for (let m = 0; m <= 360; m++) {
                    const year = m / 12;
                    let interestChargeThisMonth = 0;
                    let principalDrawnThisMonth = 0;
                    let outOfPocketPayment = 0;
                    let principalPaidThisMonth = 0;
                    let monthlyRmDraw = 0;

                    if (m > 0 && m % 12 === 0) {
                        roomUser += annTfsa;
                        roomTammy += annTfsa;
                        taxableCash = fillTFSAs(taxableCash);
                    }

                    if (m > 0 && currentHomeValue > 0) currentHomeValue *= (1 + monthlyAppreciation);

                    const fullYears = Math.floor(m / 12);
                    const monthlyPensionTotal = (Number(pensionUser) + Number(pensionTammy)) * Math.pow(1 + annualInflation, fullYears);

                    let oasIncome = 0;
                    if (oasUserStartMonth >= 0 && m >= oasUserStartMonth) {
                        const yearsSinceStart = Math.floor((m - oasUserStartMonth) / 12);
                        oasIncome += Number(oasUserAmount) * Math.pow(1 + annualInflation, yearsSinceStart);
                    }
                    if (oasTammyStartMonth >= 0 && m >= oasTammyStartMonth) {
                        const yearsSinceStart = Math.floor((m - oasTammyStartMonth) / 12);
                        oasIncome += Number(oasTammyAmount) * Math.pow(1 + annualInflation, yearsSinceStart);
                    }
                    const oasNet = oasIncome * (1 - Number(oasTaxRate) / 100);

                    let monthlyDividendIncome = 0;
                    const totalLiquid = tfsaUser + tfsaTammy + taxableCash;
                    if (m > 0 && totalLiquid > 0) {
                        const yieldAmount = totalLiquid * tfsaMonthlyReturn;
                        const tfsaTotal = tfsaUser + tfsaTammy;
                        let netYield = 0;
                        if (tfsaTotal > 0) {
                            const tfsaYield = yieldAmount * (tfsaTotal / totalLiquid);
                            const ratioUser = tfsaUser / tfsaTotal;
                            tfsaUser += tfsaYield * ratioUser;
                            tfsaTammy += tfsaYield * (1 - ratioUser);
                            const taxableYield = yieldAmount - tfsaYield;
                            const afterTaxTaxable = taxableYield * (1 - taxRate);
                            taxableCash += afterTaxTaxable;
                            netYield = tfsaYield + afterTaxTaxable;
                        } else {
                            const afterTaxAll = yieldAmount * (1 - taxRate);
                            taxableCash += afterTaxAll;
                            netYield = afterTaxAll;
                        }
                        monthlyDividendIncome = netYield;
                    }

                    if (activeLoanType === 'nomad') {
                        const isExitMonth = (m === Number(nomadExitYear) * 12);
                        const isReEntryMonth = (m === (Number(nomadExitYear) + Number(nomadTravelYears)) * 12);
                        isNomadPhase = (year >= Number(nomadExitYear) && year < (Number(nomadExitYear) + Number(nomadTravelYears)));

                        if (enableDownsize && !downsizeOccurred && m === Number(downsizeYear) * 12) {
                            if (!hasSoldHouseForNomad) {
                                leftoverCashAtDownsize = currentHomeValue - balance - Number(newHomeValue);
                                const afterTfsa = fillTFSAs(leftoverCashAtDownsize);
                                taxableCash += afterTfsa;
                                leftoverCashAtDownsize = 0;
                                currentHomeValue = Number(newHomeValue);
                                balance = 0;
                                cumulativePrincipal = 0;
                                hasSoldHouseForNomad = true;
                                downsizeOccurred = true;
                            } else if (hasSoldHouseForNomad && !isNomadPhase && currentHomeValue > 0) {
                                leftoverCashAtDownsize = currentHomeValue - balance - Number(newHomeValue);
                                const afterTfsa = fillTFSAs(leftoverCashAtDownsize);
                                taxableCash += afterTfsa;
                                leftoverCashAtDownsize = 0;
                                currentHomeValue = Number(newHomeValue);
                                balance = 0;
                                cumulativePrincipal = 0;
                                downsizeOccurred = true;
                            }
                        }

                        if (!hasSoldHouseForNomad && isExitMonth) {
                            const saleProceeds = currentHomeValue;
                            const netCash = saleProceeds - balance - Number(nomadTruckBudget);
                            const afterTfsa = fillTFSAs(netCash);
                            taxableCash += afterTfsa;
                            currentHomeValue = 0;
                            balance = 0;
                            cumulativePrincipal = 0;
                            hasSoldHouseForNomad = true;
                        } else if (hasSoldHouseForNomad && isReEntryMonth) {
                            const homePrice = Number(nomadNewHomePrice);
                            const totalLiquidBefore = tfsaUser + tfsaTammy + taxableCash;
                            if (totalLiquidBefore >= homePrice) {
                                let remaining = homePrice;
                                const fromTaxable = Math.min(remaining, taxableCash);
                                taxableCash -= fromTaxable;
                                remaining -= fromTaxable;
                                if (remaining > 0) {
                                    const totalTfsa = tfsaUser + tfsaTammy;
                                    const fromTfsa = Math.min(remaining, totalTfsa);
                                    const ratioUser = tfsaUser / totalTfsa;
                                    tfsaUser -= fromTfsa * ratioUser;
                                    tfsaTammy -= fromTfsa * (1 - ratioUser);
                                    remaining -= fromTfsa;
                                }
                                currentHomeValue = homePrice;
                                balance = 0;
                                cumulativePrincipal = 0;
                            } else {
                                const shortfall = homePrice - totalLiquidBefore;
                                tfsaUser = 0;
                                tfsaTammy = 0;
                                taxableCash = 0;
                                currentHomeValue = homePrice;
                                balance = shortfall;
                                cumulativePrincipal = shortfall;
                            }
                        }
                    } else {
                        if (enableDownsize && m === Number(downsizeYear) * 12) {
                            const saleProceeds = currentHomeValue;
                            const totalDebt = balance;
                            leftoverCashAtDownsize = saleProceeds - totalDebt - Number(newHomeValue);
                            const afterTfsa = fillTFSAs(leftoverCashAtDownsize);
                            taxableCash += afterTfsa;
                            leftoverCashAtDownsize = 0;
                            currentHomeValue = Number(newHomeValue);
                            balance = 0;
                            cumulativePrincipal = 0;
                        }
                    }

                    if (activeLoanType === 'nomad') {
                        if (!hasSoldHouseForNomad) {
                            if (balance > 0) { interestChargeThisMonth = balance * helocMonthlyRate; outOfPocketPayment = interestChargeThisMonth; totalOutofPocketInterest += outOfPocketPayment; cumulativeInterest += interestChargeThisMonth; }
                            if (m === 1) { const adv = Number(initialAdvance); balance += adv; cumulativePrincipal += adv; principalDrawnThisMonth += adv; }
                        } else if (isNomadPhase) {
                        } else {
                            if (enableNomadRM && year >= Number(nomadRmTriggerYear) && currentHomeValue > 0) {
                                if (balance > 0) { interestChargeThisMonth = balance * rmMonthlyRate; balance += interestChargeThisMonth; cumulativeInterest += interestChargeThisMonth; }
                                let requestedMonthly = Number(nomadRmMonthly);
                                const currentMaxLimit = currentHomeValue * 0.55;
                                const availablePrincipal = Math.max(0, currentMaxLimit - cumulativePrincipal);
                                const actualMonthly = Math.min(requestedMonthly, availablePrincipal);

        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
