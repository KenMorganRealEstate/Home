<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Wealth & Retirement Simulator</title>

    <script src="https://cdn.tailwindcss.com">
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root {
            --color-bg: #f8fafc;
            --color-surface: #ffffff;
            --color-border: #e2e8f0;
            --color-accent: #6366f1;
            --color-accent-soft: #eef2ff;
        }
        * {
            scrollbar-width: thin;
            scrollbar-color: #cbd5e1 transparent;
        }
        *::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        *::-webkit-scrollbar-track {
            background: transparent;
        }
        *::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
        .animate-fade-in {
            animation: fadeInUp 0.5s ease-out forwards;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .card-hover {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px -8px rgba(0, 0, 0, 0.12), 0 4px 12px -4px rgba(0, 0, 0, 0.06);
        }
        .stat-accent-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            border-radius: 4px 0 0 4px;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-white to-indigo-50/30 min-h-screen antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useCallback, useRef } = React;
        const {
            ComposedChart,
            Line,
            Area,
            XAxis,
            YAxis,
            CartesianGrid,
            Tooltip: RechartsTooltip,
            ResponsiveContainer,
            Legend,
            ReferenceLine,
            ReferenceArea,
        } = Recharts;

        // ── SVG Icons (unchanged) ────────────────────────────
        const svgPaths = {
            Info: <><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></>,
            Plus: <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
            Trash2: <><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></>,
            Home: <><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>,
            Landmark: <><line x1="3" y1="22" x2="21" y2="22"/><line x1="6" y1="18" x2="6" y2="11"/><line x1="10" y1="18" x2="10" y2="11"/><line x1="14" y1="18" x2="14" y2="11"/><line x1="18" y1="18" x2="18" y2="11"/><polygon points="12 2 20 7 4 7"/></>,
            AlertCircle: <><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>,
            ArrowRightLeft: <><path d="m16 3 4 4-4 4"/><path d="M20 7H4"/><path d="m8 21-4-4 4-4"/><path d="M4 17h16"/></>,
            ArrowDownCircle: <><circle cx="12" cy="12" r="10"/><path d="m8 12 4 4 4-4"/><path d="M12 8v8"/></>,
            Lightbulb: <><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></>,
            MapPin: <><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></>,
            Compass: <><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></>,
            Wallet: <><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></>,
            DollarSign: <><line x1="12" y1="2" x2="12" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></>,
            Download: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>,
            Upload: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></>,
            Calendar: <><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>,
            RefreshCw: <><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></>,
            Zap: <><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></>,
        };

        const Icon = ({ name, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
                fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"
                strokeLinejoin="round" className={className}>
                {svgPaths[name]}
            </svg>
        );

        // ── Helper Components ────────────────────────────────
        const InfoTooltip = ({ text }) => (
            <span className="group relative flex items-center justify-center ml-1.5 cursor-help inline-flex">
                <Icon name="Info" size={15} className="text-slate-400 hover:text-indigo-500 transition-colors" />
                <span className="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 w-64 p-3 bg-slate-800 text-white text-xs rounded-xl shadow-xl opacity-0 group-hover:opacity-100 transition-opacity z-50 pointer-events-none font-normal leading-relaxed">
                    {text}
                    <span className="absolute top-full left-1/2 -translate-x-1/2 border-[6px] border-transparent border-t-slate-800"></span>
                </span>
            </span>
        );

        const InputGroup = ({ label, value, onChange, type = "number", prefix = "", suffix = "", tooltip, step = "1", min = "0", max, disabled = false }) => (
            <div className="flex flex-col mb-3.5">
                <label className="flex items-center text-xs font-semibold text-slate-600 mb-1.5 tracking-wide uppercase">
                    {label} {tooltip && <InfoTooltip text={tooltip} />}
                </label>
                <div className="relative flex items-center group">
                    {prefix && <span className="absolute left-3.5 text-slate-400 font-medium text-sm">{prefix}</span>}
                    <input
                        type={type}
                        className={`w-full py-2.5 px-3.5 border border-slate-200 rounded-xl bg-white focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-400 outline-none transition-all text-sm font-medium text-slate-700 placeholder:text-slate-300 disabled:bg-slate-50 disabled:text-slate-400 ${prefix ? 'pl-9' : ''} ${suffix ? 'pr-10' : ''}`}
                        value={value}
                        onChange={(e) => onChange(e.target.value)}
                        step={step}
                        min={min}
                        max={max}
                        disabled={disabled}
                    />
                    {suffix && <span className="absolute right-3.5 text-slate-400 font-medium text-sm">{suffix}</span>}
                </div>
            </div>
        );

        const ToggleSwitch = ({ checked, onChange, label, tooltip }) => (
            <div className="flex items-center justify-between py-1.5">
                <span className="text-xs font-semibold text-slate-600 flex items-center gap-1">
                    {label} {tooltip && <InfoTooltip text={tooltip} />}
                </span>
                <label className="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" className="sr-only peer" checked={checked} onChange={onChange} />
                    <div className="w-9 h-5 bg-slate-200 rounded-full peer peer-checked:bg-indigo-500 peer-focus:ring-2 peer-focus:ring-indigo-500/30 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:after:translate-x-full"></div>
                </label>
            </div>
        );

        // ── Reusable Lump Sum Controls ──────────────────────
        const LumpSumSection = ({ newLumpYear, setNewLumpYear, newLumpAmount, setNewLumpAmount, newLumpReason, setNewLumpReason, lumpSums, addLumpSum, removeLumpSum }) => (
            <div className="border-t pt-4 mt-4">
                <h3 className="text-sm font-bold text-slate-700 mb-2 flex items-center gap-1.5">
                    <Icon name="Calendar" size={15} className="text-amber-500" /> Scheduled Lump Sums
                </h3>
                <div className="flex gap-2 flex-wrap items-end">
                    <div className="w-20">
                        <InputGroup label="Year" value={newLumpYear} onChange={setNewLumpYear} min="0" max="30" />
                    </div>
                    <div className="flex-1 min-w-[100px]">
                        <InputGroup label="Amount" value={newLumpAmount} onChange={setNewLumpAmount} prefix="$" />
                    </div>
                    <div className="flex-1 min-w-[120px]">
                        <label className="text-xs font-semibold text-slate-600 mb-1.5 tracking-wide uppercase block">
                            Reason
                        </label>
                        <input
                            type="text"
                            className="w-full py-2.5 px-3.5 border border-slate-200 rounded-xl bg-white focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-400 outline-none text-sm font-medium text-slate-700 placeholder:text-slate-300"
                            value={newLumpReason}
                            onChange={(e) => setNewLumpReason(e.target.value)}
                            placeholder="e.g., World Tour"
                        />
                    </div>
                    <button onClick={addLumpSum} className="mb-3.5 p-2.5 bg-indigo-500 hover:bg-indigo-600 text-white rounded-xl shadow-sm">
                        <Icon name="Plus" size={18} />
                    </button>
                </div>
                {lumpSums.length > 0 && (
                    <div className="space-y-1.5 mt-2 max-h-40 overflow-y-auto">
                        {lumpSums.map(ls => (
                            <div key={ls.id} className="flex justify-between items-center bg-slate-50 p-2.5 rounded-lg text-xs border border-slate-100">
                                <span className="font-semibold text-slate-700">Yr {ls.year}: ${Number(ls.amount).toLocaleString()}</span>
                                <span className="text-slate-500 italic">{ls.reason}</span>
                                <button onClick={() => removeLumpSum(ls.id)} className="text-rose-400 hover:text-rose-600 transition-colors ml-2">
                                    <Icon name="Trash2" size={14} />
                                </button>
                            </div>
                        ))}
                    </div>
                )}
            </div>
        );

        function App() {
            // ── State with default semi‑aggressive spending plan ────────────
            const [loanType, setLoanType] = useState('nomad');
            const [homeValue, setHomeValue] = useState(1200000);
            const [startingAge, setStartingAge] = useState(60);
            const [interestRate, setInterestRate] = useState(7.24);
            const [helocRate, setHelocRate] = useState(7.45);
            const [appreciationRate, setAppreciationRate] = useState(2.0);
            const [initialAdvance, setInitialAdvance] = useState(0);
            const [monthlyWithdrawal, setMonthlyWithdrawal] = useState(0);

            // Default lump sums from the semi‑aggressive plan
            const [lumpSums, setLumpSums] = useState([
                { id: 1, year: 6, amount: 50000, reason: "World tour – business class" },
                { id: 2, year: 8, amount: 60000, reason: "African safari & luxury lodges" },
                { id: 3, year: 10, amount: 70000, reason: "Asia & Australia expedition" },
                { id: 4, year: 12, amount: 75000, reason: "European river cruises & villas" },
                { id: 5, year: 14, amount: 60000, reason: "Alaska & Canadian Rockies" },
                { id: 6, year: 16, amount: 50000, reason: "South America adventure" },
                { id: 7, year: 18, amount: 40000, reason: "Mediterranean cruise" },
                { id: 8, year: 20, amount: 40000, reason: "Family reunion resort" },
            ]);
            const [newLumpYear, setNewLumpYear] = useState(10);
            const [newLumpAmount, setNewLumpAmount] = useState(15000);
            const [newLumpReason, setNewLumpReason] = useState("Vacation / Car");

            const [principalPayments, setPrincipalPayments] = useState([]);
            const [newPayYear, setNewPayYear] = useState(1);
            const [newPayAmount, setNewPayAmount] = useState(20000);

            const [enableDownsize, setEnableDownsize] = useState(false);
            const [downsizeYear, setDownsizeYear] = useState(5);
            const [newHomeValue, setNewHomeValue] = useState(800000);

            const [enableTFSA, setEnableTFSA] = useState(true);
            const [tfsaRoom, setTfsaRoom] = useState(196000);
            const [tfsaReturnRate, setTfsaReturnRate] = useState(5.0);

            // Nomad
            const [nomadExitYear, setNomadExitYear] = useState(3);
            const [nomadTruckBudget, setNomadTruckBudget] = useState(150000);
            const [nomadTravelYears, setNomadTravelYears] = useState(3);      // extended to 3 years
            const [nomadYield, setNomadYield] = useState(5.0);
            const [nomadNewHomePrice, setNomadNewHomePrice] = useState(750000); // downsize home

            // Pensions & OAS
            const [pensionUser, setPensionUser] = useState(3316.36);
            const [pensionTammy, setPensionTammy] = useState(3031.36);
            const [inflationRate, setInflationRate] = useState(2.0);
            const [oasUserAmount, setOasUserAmount] = useState(800);
            const [oasTammyAmount, setOasTammyAmount] = useState(900);
            const [oasUserStartAge, setOasUserStartAge] = useState(65);
            const [oasTammyStartAge, setOasTammyStartAge] = useState(65);
            const [oasTaxRate, setOasTaxRate] = useState(15);

            // Nomad RM – enabled with trigger year 0 for stress test
            const [enableNomadRM, setEnableNomadRM] = useState(true);
            const [nomadRmTriggerYear, setNomadRmTriggerYear] = useState(0);
            const [nomadRmMonthly, setNomadRmMonthly] = useState(0);

            // Chart
            const [hoveredData, setHoveredData] = useState(null);
            const [chartDomainLeft, setChartDomainLeft] = useState(0);
            const [chartDomainRight, setChartDomainRight] = useState(30);
            const fileInputRef = useRef(null);

            // ── Simulation Engine (unchanged) ─────────────────
            const simulationData = useMemo(() => {
                const data = [];
                let currentHomeValue = Number(homeValue);
                const initialHomeValueTracker = Number(homeValue);
                let balance = Number(initialAdvance);
                let cumulativePrincipal = Number(initialAdvance);
                let totalOutofPocketInterest = 0;
                let cumulativeInterest = 0;
                let limitHit = false;
                let currentTfsaBalance = 0;
                let leftoverCashAtDownsize = 0;
                let investedInTfsaAmount = 0;
                let isNomadPhase = false;
                let hasSoldHouseForNomad = false;

                const rmR = Number(interestRate) / 100;
                const rmMonthlyRate = Math.pow(1 + rmR / 2, 1 / 6) - 1;
                const helocR = Number(helocRate) / 100;
                const helocMonthlyRate = helocR / 12;
                const monthlyAppreciation = Number(appreciationRate) / 100 / 12;
                const tfsaMonthlyReturn = (loanType === 'nomad' ? Number(nomadYield) : Number(tfsaReturnRate)) / 100 / 12;
                const monthlyInflation = Number(inflationRate) / 100 / 12;

                const oasUserStartMonth = (Number(oasUserStartAge) - Number(startingAge)) * 12;
                const oasTammyStartMonth = (Number(oasTammyStartAge) - Number(startingAge)) * 12;

                for (let m = 0; m <= 360; m++) {
                    const year = m / 12;
                    let interestChargeThisMonth = 0;
                    let principalDrawnThisMonth = 0;
                    let outOfPocketPayment = 0;
                    let principalPaidThisMonth = 0;
                    let monthlyPensionTotal = (Number(pensionUser) + Number(pensionTammy)) * Math.pow(1 + monthlyInflation, m);
                    let monthlyDividendIncome = 0;
                    let monthlyRmDraw = 0;
                    let totalMonthlyIncome = 0;

                    let oasIncome = 0;
                    if (oasUserStartMonth >= 0 && m >= oasUserStartMonth) {
                        const monthsSinceStart = m - oasUserStartMonth;
                        oasIncome += Number(oasUserAmount) * Math.pow(1 + monthlyInflation, monthsSinceStart);
                    }
                    if (oasTammyStartMonth >= 0 && m >= oasTammyStartMonth) {
                        const monthsSinceStart = m - oasTammyStartMonth;
                        oasIncome += Number(oasTammyAmount) * Math.pow(1 + monthlyInflation, monthsSinceStart);
                    }
                    const oasNet = oasIncome * (1 - Number(oasTaxRate) / 100);

                    if (loanType === 'nomad') {
                        const isExitMonth = (m === Number(nomadExitYear) * 12);
                        const isReEntryMonth = (m === (Number(nomadExitYear) + Number(nomadTravelYears)) * 12);
                        isNomadPhase = (year >= Number(nomadExitYear) && year < (Number(nomadExitYear) + Number(nomadTravelYears)));

                        if (!hasSoldHouseForNomad) {
                            if (m > 0) currentHomeValue *= (1 + monthlyAppreciation);
                            interestChargeThisMonth = balance * helocMonthlyRate;
                            outOfPocketPayment = interestChargeThisMonth;
                            totalOutofPocketInterest += outOfPocketPayment;
                            cumulativeInterest += interestChargeThisMonth;
                            if (m === 1) {
                                balance += Number(initialAdvance);
                                cumulativePrincipal += Number(initialAdvance);
                            }
                            if (isExitMonth) {
                                hasSoldHouseForNomad = true;
                                currentTfsaBalance = Math.max(0, currentHomeValue - balance - Number(nomadTruckBudget));
                                currentHomeValue = 0;
                                balance = 0;
                            }
                            totalMonthlyIncome = monthlyPensionTotal + oasNet - outOfPocketPayment;
                        } else if (isNomadPhase) {
                            if (m > 0) {
                                monthlyDividendIncome = Math.max(0, currentTfsaBalance * tfsaMonthlyReturn);
                                currentTfsaBalance += monthlyDividendIncome;
                                totalMonthlyIncome = monthlyPensionTotal + oasNet + monthlyDividendIncome;
                            }
                        } else {
                            if (isReEntryMonth) {
                                const homePrice = Number(nomadNewHomePrice);
                                if (currentTfsaBalance >= homePrice) {
                                    currentTfsaBalance -= homePrice;
                                    currentHomeValue = homePrice;
                                } else {
                                    currentHomeValue = currentTfsaBalance;
                                    currentTfsaBalance = 0;
                                }
                            }
                            if (m > 0 && currentHomeValue > 0) {
                                currentHomeValue *= (1 + monthlyAppreciation);
                                monthlyDividendIncome = Math.max(0, currentTfsaBalance * tfsaMonthlyReturn);
                                currentTfsaBalance += monthlyDividendIncome;
                                if (enableNomadRM && year >= Number(nomadRmTriggerYear)) {
                                    interestChargeThisMonth = balance * rmMonthlyRate;
                                    balance += interestChargeThisMonth;
                                    cumulativeInterest += interestChargeThisMonth;
                                    let requestedWithdrawal = Number(nomadRmMonthly);
                                    const scheduledLumpSums = lumpSums.filter(ls => ls.year * 12 === m);
                                    const lumpSumAmount = scheduledLumpSums.reduce((sum, ls) => sum + Number(ls.amount), 0);
                                    requestedWithdrawal += lumpSumAmount;
                                    const currentMaxLimit = currentHomeValue * 0.55;
                                    const availablePrincipal = Math.max(0, currentMaxLimit - cumulativePrincipal);
                                    const actualWithdrawal = Math.min(requestedWithdrawal, availablePrincipal);
                                    if (requestedWithdrawal > 0 && availablePrincipal <= 0) limitHit = true;
                                    balance += actualWithdrawal;
                                    cumulativePrincipal += actualWithdrawal;
                                    principalDrawnThisMonth = actualWithdrawal;
                                    monthlyRmDraw = actualWithdrawal;
                                }
                                totalMonthlyIncome = monthlyPensionTotal + oasNet + monthlyDividendIncome + monthlyRmDraw;
                            }
                        }
                    } else {
                        // Standard Reverse / HELOC
                        if (enableDownsize && m === Number(downsizeYear) * 12) {
                            const saleProceeds = currentHomeValue;
                            const totalDebtToClear = balance;
                            leftoverCashAtDownsize = saleProceeds - totalDebtToClear - Number(newHomeValue);
                            const dynamicTfsaRoom = Number(tfsaRoom) + (Math.floor(year) * 14000);
                            if (enableTFSA && leftoverCashAtDownsize > 0) {
                                investedInTfsaAmount = Math.min(leftoverCashAtDownsize, dynamicTfsaRoom);
                                currentTfsaBalance = investedInTfsaAmount;
                                leftoverCashAtDownsize -= investedInTfsaAmount;
                            }
                            currentHomeValue = Number(newHomeValue);
                            balance = 0;
                            cumulativePrincipal = 0;
                        }
                        if (m > 0) {
                            currentHomeValue *= (1 + monthlyAppreciation);
                            if (currentTfsaBalance > 0) {
                                currentTfsaBalance *= (1 + tfsaMonthlyReturn);
                            }
                            if (loanType === 'reverse') {
                                interestChargeThisMonth = balance * rmMonthlyRate;
                                balance += interestChargeThisMonth;
                            } else if (loanType === 'heloc') {
                                interestChargeThisMonth = balance * helocMonthlyRate;
                                outOfPocketPayment = interestChargeThisMonth;
                                totalOutofPocketInterest += outOfPocketPayment;
                            }
                            cumulativeInterest += interestChargeThisMonth;
                            let requestedWithdrawal = Number(monthlyWithdrawal);
                            const scheduledLumpSums = lumpSums.filter(ls => ls.year * 12 === m);
                            const lumpSumAmount = scheduledLumpSums.reduce((sum, ls) => sum + Number(ls.amount), 0);
                            requestedWithdrawal += lumpSumAmount;
                            const currentMaxLimit = (enableDownsize && m >= Number(downsizeYear) * 12) ? Number(newHomeValue) * 0.55 : Number(homeValue) * 0.55;
                            const availablePrincipal = Math.max(0, currentMaxLimit - cumulativePrincipal);
                            const actualWithdrawal = Math.min(requestedWithdrawal, availablePrincipal);
                            if (requestedWithdrawal > 0 && availablePrincipal <= 0) limitHit = true;
                            balance += actualWithdrawal;
                            cumulativePrincipal += actualWithdrawal;
                            principalDrawnThisMonth = actualWithdrawal;
                            if (loanType === 'heloc') {
                                const scheduledPayments = principalPayments.filter(p => p.year * 12 === m);
                                const totalPayment = scheduledPayments.reduce((sum, p) => sum + Number(p.amount), 0);
                                if (totalPayment > 0) {
                                    const actualPayment = Math.min(totalPayment, balance);
                                    balance -= actualPayment;
                                    cumulativePrincipal = Math.max(0, cumulativePrincipal - actualPayment);
                                    principalPaidThisMonth = actualPayment;
                                }
                            }
                        }
                        totalMonthlyIncome = monthlyPensionTotal + oasNet + monthlyDividendIncome + monthlyRmDraw - outOfPocketPayment;
                    }

                    const cumulativeAppreciation = loanType === 'nomad' && hasSoldHouseForNomad && !isNomadPhase
                        ? Math.max(0, currentHomeValue - Number(nomadNewHomePrice))
                        : currentHomeValue - initialHomeValueTracker;

                    data.push({
                        month: m,
                        year: year,
                        displayYear: Math.floor(year),
                        displayMonth: m % 12 || (m === 0 ? 0 : 12),
                        age: Number(startingAge) + Math.floor(year),
                        homeValue: Math.round(currentHomeValue),
                        balance: Math.round(balance),

                                        <>
                                            <div className="bg-white p-4 rounded-xl border shadow-sm card-hover relative"><div className="stat-accent-bar bg-emerald-500"></div><div className="pl-5"><div className="text-xs font-semibold text-slate-500 uppercase">Total Borrowed</div><p className="text-xl font-bold">${finalMonth.cumulativePrincipal?.toLocaleString()}</p></div></div>
                                            <div className="bg-white p-4 rounded-xl border shadow-sm card-hover relative"><div className="stat-accent-bar bg-rose-500"></div><div className="pl-5"><div className="text-xs font-semibold text-slate-500 uppercase">Cost of Loan</div><p className="text-xl font-bold text-rose-500">${loanType==='reverse' ? (finalMonth.balance - finalMonth.cumulativePrincipal)?.toLocaleString() : finalMonth.totalOutofPocketInterest?.toLocaleString()}</p></div></div>
                                        </>
                                    )}
                                    <div className="bg-white p-4 rounded-xl border shadow-sm card-hover relative"><div className="stat-accent-bar bg-emerald-500"></div><div className="pl-5"><div className="text-xs font-semibold text-slate-500 uppercase">Final Net Worth</div><p className="text-xl font-bold text-emerald-600">${finalMonth.totalNetWorth?.toLocaleString()}</p></div></div>
                                    <div className="bg-white p-4 rounded-xl border shadow-sm card-hover relative bg-blue-50/30"><div className="stat-accent-bar bg-blue-500"></div><div className="pl-5"><div className="text-xs font-semibold text-blue-600 uppercase">Home Equity</div><p className="text-xl font-bold text-blue-700">${finalMonth.equity?.toLocaleString()}</p></div></div>
                                </div>
                                <div className="bg-white rounded-2xl p-4 sm:p-6 shadow-sm border border-slate-100 flex-grow flex flex-col card-hover">
                                    <div className="flex justify-between items-center border-b pb-4 mb-4">
                                        <h2 className="text-lg font-bold">{loanType==='nomad' ? '🗺️ Master Strategy Timeline' : '📈 Wealth Progression'} (30 Years)</h2>
                                        <div className="flex gap-2 text-xs">
                                            <button onClick={()=>{setChartDomainLeft(0);setChartDomainRight(30)}} className="px-3 py-1.5 rounded-lg bg-slate-100 hover:bg-slate-200 font-semibold">Full</button>
                                            <button onClick={()=>{setChartDomainLeft(0);setChartDomainRight(10)}} className="px-3 py-1.5 rounded-lg bg-slate-100 hover:bg-slate-200 font-semibold">10 Yr</button>
                                            <button onClick={()=>{setChartDomainLeft(20);setChartDomainRight(30)}} className="px-3 py-1.5 rounded-lg bg-slate-100 hover:bg-slate-200 font-semibold">20-30 Yr</button>
                                        </div>
                                    </div>
                                    <div className="flex-grow min-h-[380px]">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <ComposedChart data={simulationData} margin={{top:10,right:10,left:0,bottom:20}} onMouseMove={(e)=>{if(e?.activePayload?.length) setHoveredData(e.activePayload[0].payload)}} onMouseLeave={()=>setHoveredData(null)}>
                                                <defs>
                                                    <linearGradient id="equityGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#3B82F6" stopOpacity={0.3}/><stop offset="100%" stopColor="#3B82F6" stopOpacity={0.02}/></linearGradient>
                                                    <linearGradient id="debtGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#EF4444" stopOpacity={0.25}/><stop offset="100%" stopColor="#EF4444" stopOpacity={0.02}/></linearGradient>
                                                    <linearGradient id="liquidGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#0D9488" stopOpacity={0.3}/><stop offset="100%" stopColor="#0D9488" stopOpacity={0.02}/></linearGradient>
                                                </defs>
                                                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#E2E8F0" />
                                                <XAxis dataKey="year" tick={<CustomXAxisTick/>} tickCount={7} domain={[chartDomainLeft, chartDomainRight]} type="number" height={40}/>
                                                <YAxis yAxisId="left" tickFormatter={t=>`$${(t/1000).toFixed(0)}k`} tick={{fontSize:11}} width={60}/>
                                                {loanType==='nomad' && <YAxis yAxisId="right" orientation="right" tickFormatter={t=>`$${(t/1000).toFixed(0)}k`} tick={{fontSize:11,fill:'#9333ea'}} width={55}/>}
                                                <RechartsTooltip content={({active,payload})=>{if(active&&payload?.length){const d=payload[0].payload;return(<div className="bg-white/98 backdrop-blur-md p-0 rounded-2xl shadow-2xl min-w-[260px] border border-slate-100 overflow-hidden"><div className="bg-gradient-to-r from-indigo-500 to-violet-500 px-4 py-3"><p className="font-bold text-white text-sm">Year {d.displayYear}, Month {d.displayMonth} · Age {d.age}</p></div><div className="p-4 space-y-2">{d.isDownsizeMonth&&<div className="mb-2 bg-indigo-50 text-indigo-700 p-2.5 rounded-lg text-xs flex items-center gap-1.5"><Icon name="MapPin" size={14}/> {loanType==='nomad'?'🏡 Re-Entry: Bought Downsized Home!':'🏡 Downsize Event — Debt Cleared!'}</div>}{d.isExitMonth&&<div className="mb-2 bg-emerald-50 text-emerald-700 p-2.5 rounded-lg text-xs flex items-center gap-1.5"><Icon name="Landmark" size={14}/> Home Sold! Equity Cashed Out.</div>}{d.isNomadPhase&&loanType==='nomad'&&<div className="mb-2 bg-amber-50 text-amber-700 p-2.5 rounded-lg text-xs flex items-center gap-1.5"><Icon name="Compass" size={14}/> 🌍 Full-Time Travel Phase</div>}<div className="space-y-1.5 text-sm">{d.homeValue>0&&<p className="flex justify-between text-blue-600"><span>Home Equity:</span><span className="font-semibold">${d.equity.toLocaleString()}</span></p>}{d.balance>0&&<p className="flex justify-between text-rose-500"><span>Loan Debt:</span><span className="font-semibold">${d.balance.toLocaleString()}</span></p>}{d.tfsaBalance>0&&<p className="flex justify-between text-teal-600"><span>{loanType==='nomad'?'💧 Liquid Wealth:':'TFSA Balance:'}</span><span className="font-semibold">${d.tfsaBalance.toLocaleString()}</span></p>}{d.leftoverCashAtDownsize>0&&<p className="flex justify-between text-emerald-600"><span>Cash Leftover:</span><span className="font-semibold">${d.leftoverCashAtDownsize.toLocaleString()}</span></p>}<div className="border-t pt-2 mt-1"><p className="flex justify-between text-slate-800 font-bold"><span>Net Worth:</span><span>${d.totalNetWorth.toLocaleString()}</span></p></div></div>{loanType==='nomad'&&d.month>0&&<div className="mt-3 pt-3 border-t"><p className="text-xs font-bold text-slate-500 uppercase mb-2">💰 Monthly Cash Flow</p><div className="space-y-1 text-xs"><p className="flex justify-between"><span>Pensions:</span><span>${d.monthlyPensionTotal.toLocaleString()}</span></p><p className="flex justify-between text-indigo-600"><span>OAS (net):</span><span>${d.monthlyOasNet?.toLocaleString()}</span></p><p className="flex justify-between text-teal-600"><span>Yield:</span><span>${d.monthlyDividendIncome.toLocaleString()}</span></p>{d.monthlyRmDraw>0&&<p className="flex justify-between text-indigo-600 font-semibold bg-indigo-50 px-2 py-0.5 rounded"><span>RM Draw:</span><span>+ ${d.monthlyRmDraw.toLocaleString()}</span></p>}{d.outOfPocketPayment>0&&<p className="flex justify-between text-rose-600"><span>HELOC Payment:</span><span>- ${d.outOfPocketPayment.toLocaleString()}</span></p>}<div className="border-t pt-1.5 mt-1"><p className="flex justify-between text-violet-700 font-bold text-sm"><span>Usable Cash:</span><span>${d.totalMonthlyIncome.toLocaleString()}/mo</span></p></div></div></div>}{d.limitHit&&<div className="mt-3 bg-amber-50 text-amber-700 p-2.5 rounded-lg text-xs flex items-start gap-1.5"><Icon name="AlertCircle" size={14} className="mt-0.5"/> 55% Principal limit reached.</div>}</div></div>);}return null;}}/>
                                                <Legend verticalAlign="top" height={36} iconType="circle" wrapperStyle={{fontSize:12,fontWeight:600}}/>
                                                {loanType==='nomad'&&<><ReferenceLine yAxisId="left" x={Number(nomadExitYear)} stroke="#f59e0b" strokeWidth={2} strokeDasharray="5 5" label={{position:'top',value:'🚐 Sell Home',fill:'#d97706',fontSize:11,fontWeight:700}}/><ReferenceLine yAxisId="left" x={Number(nomadExitYear)+Number(nomadTravelYears)} stroke="#6366f1" strokeWidth={2} strokeDasharray="5 5" label={{position:'top',value:'🏡 Re-Entry',fill:'#4f46e5',fontSize:11,fontWeight:700}}/></>}
                                                <Area yAxisId="left" type="monotone" dataKey="balance" stackId="1" stroke="#EF4444" strokeWidth={1.5} fill="url(#debtGrad)" name={loanType==='nomad'?"RM Debt":"Loan Balance"} isAnimationActive={false}/>
                                                <Area yAxisId="left" type="monotone" dataKey="equity" stackId="1" stroke="#3B82F6" strokeWidth={1.5} fill="url(#equityGrad)" name="Home Equity" isAnimationActive={false}/>
                                                {((enableTFSA&&enableDownsize)||loanType==='nomad')&&<Area yAxisId="left" type="monotone" dataKey="tfsaBalance" stackId="1" stroke="#0D9488" strokeWidth={1.5} fill="url(#liquidGrad)" name={loanType==='nomad'?"Liquid Wealth":"TFSA Balance"} isAnimationActive={false}/>}
                                                {loanType!=='nomad'&&<Line yAxisId="left" type="monotone" dataKey={loanType==='heloc'?'totalOutofPocketInterest':'cumulativeInterest'} stroke="#f59e0b" strokeWidth={2.5} name={loanType==='heloc'?"Out-of-Pocket Interest":"Compounded Interest"} dot={false} isAnimationActive={false}/>}
                                                {loanType==='nomad'&&<Line yAxisId="right" type="monotone" dataKey="totalMonthlyIncome" stroke="#9333ea" strokeWidth={2.5} name="Monthly Income" dot={false} isAnimationActive={false}/>}
                                            </ComposedChart>
                                        </ResponsiveContainer>
                                    </div>
                                    {/* Insight Box */}
                                    <div className={`mt-5 p-4 rounded-xl border flex flex-col sm:flex-row gap-4 items-center transition-all duration-300 ${
                                        loanType==='nomad'
                                        ? (nomadPhase===0?'bg-slate-50 border-slate-200':nomadPhase===1?'bg-amber-50 border-amber-200':nomadPhase===2?'bg-teal-50 border-teal-200':'bg-indigo-50 border-indigo-200')
                                        : (activeData.cumulativeAppreciation >= activeData.cumulativeInterest ? 'bg-emerald-50 border-emerald-200' : 'bg-rose-50 border-rose-200')
                                    }`}>
                                        <div className="flex-shrink-0 p-3 rounded-full bg-white shadow-sm">
                                            {loanType==='nomad' ? <Icon name={['Home','Compass','Wallet','Zap'][nomadPhase??0]} size={24} className={['text-slate-500','text-amber-500','text-teal-500','text-indigo-500'][nomadPhase??0]}/> : <Icon name="Lightbulb" size={24} className={activeData.cumulativeAppreciation >= activeData.cumulativeInterest ? 'text-emerald-500' : 'text-rose-500'}/>}
                                        </div>
                                        <div className="flex-grow">
                                            {loanType==='nomad' ? <>
                                                <h4 className="font-bold text-sm uppercase tracking-wider mb-1 text-slate-700">{['Phase 0: Waiting to Pivot','Phase 1: The Nomad Years','Phase 2: Re-Entry','Phase 3: The Dual Engine'][nomadPhase??0]} (Age {activeData.age})</h4>
                                                <p className="text-sm text-slate-600">{['Your home appreciates ~$'+Math.round(activeData.homeValue*(Number(appreciationRate)/100)).toLocaleString()+'/yr. Cash flow: $'+activeData.totalMonthlyIncome?.toLocaleString()+'/mo.', 'Liquid war chest: $'+activeData.tfsaBalance?.toLocaleString()+'. You are getting paid to wait!', 'You still have $'+activeData.tfsaBalance?.toLocaleString()+' invested after buying home.', 'Dual Engine active! Home: $'+activeData.homeValue?.toLocaleString()+' | Liquid: $'+activeData.tfsaBalance?.toLocaleString()][nomadPhase??0]}</p>
                                            </> : <>
                                                <h4 className={`font-bold text-sm uppercase tracking-wider mb-1 ${activeData.cumulativeAppreciation >= activeData.cumulativeInterest ? 'text-emerald-700' : 'text-rose-700'}`}>Live Insight: Year {activeData.displayYear}</h4>
                                                <p className="text-sm text-slate-600">🏠 Home Growth: <strong className="text-emerald-600">${activeData.cumulativeAppreciation?.toLocaleString()}</strong> | 💸 Interest Cost: <strong className="text-rose-600">${activeData.cumulativeInterest?.toLocaleString()}</strong> → {activeData.cumulativeAppreciation >= activeData.cumulativeInterest ? '✅ Appreciation winning!' : '⚠️ Interest outpacing growth.'}</p>
                                            </>}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div className="text-center text-xs text-slate-400 pb-4">Simulator for educational purposes only. Not financial advice.</div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
