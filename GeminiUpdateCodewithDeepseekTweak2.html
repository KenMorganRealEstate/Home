ai.id)} className="text-rose-400 hover:text-rose-600 transition-colors ml-2"><Icon name="Trash2" size={14} /></button></div> ))} </div> )} </div> );

            // Recalibration (mid‑course correction)

            const [dashboardChartTab, setDashboardChartTab] = useState('wealth');

            // The Simulation Engine (handles "includeActive" flag for baseline comparisons)
            const runSimulation = useCallback((effectiveLoanType, includeActive = true) => {
                const data = [];
                let currentHomeValue = Number(homeValue);
                const initialHomeValueTracker = Number(homeValue);
                let balance = Number(initialAdvance);
                let cumulativePrincipal = Number(initialAdvance);
                let totalOutofPocketInterest = 0;

                let limitHit = false;
                let tfsaUser = 0;

                let isNomadPhase = false;
                let hasSoldHouseForNomad = false;
                let downsizeOccurred = false;
                let roomUser = Number(tfsaRoomUser);
                let roomTammy = Number(tfsaRoomTammy);
                let cumulativeInvestmentIncome = 0;
                let cumulativeTaxSaved = 0;
                let totalTfsaContributions = 0;
                let totalTaxableContributions = 0;
                let cumulativeActiveIncome = 0;

                                let rmR = Number(interestRate) / 100;
                let rmMonthlyRate = Math.pow(1 + rmR / 2, 1 / 6) - 1;
                let helocR = Number(helocRate) / 100;
                let helocMonthlyRate = helocR / 12;
                let monthlyAppreciation = Number(appreciationRate) / 100 / 12;
                let tfsaMonthlyReturn = (effectiveLoanType === 'nomad' ? Number(nomadYield) : Number(tfsaReturnRate)) / 100 / 12;

                const oasUserStartMonth = (Number(oasUserStartAge) - Number(startingAge)) * 12;

                const annTfsa = Number(annualTfsaContribution);
                const taxRate = Number(nonRegTaxRate) / 100;

                const fillTFSAs = (amount) => {
                    const roomUserNow = Math.max(0, roomUser - tfsaUser);
                    const roomTammyNow = Math.max(0, roomTammy - tfsaTammy);
                    const totalRoom = roomUserNow + roomTammyNow;
                    if (totalRoom <= 0 || amount <= 0) return amount;
                    const toUser = Math.min(roomUserNow, amount * (roomUserNow / totalRoom));
                    const toTammy = Math.min(roomTammyNow, amount * (roomTammyNow / totalRoom));
                    tfsaUser += toUser;
                    tfsaTammy += toTammy;
                    totalTfsaContributions += toUser + toTammy;
                    return amount - toUser - toTammy;
                };

                for (let m = 0; m <= 360; m++) {
                    const year = m / 12;
                    let interestChargeThisMonth = 0;
                    let principalDrawnThisMonth = 0;
                    let outOfPocketPayment = 0;
                    let principalPaidThisMonth = 0;
                    let monthlyRmDraw = 0;
                    let activeIncomeThisMonth = 0; 

                    if (m > 0 && m % 12 === 0) {
                        roomUser += annTfsa;
                        roomTammy += annTfsa;
                        taxableCash = fillTFSAs(taxableCash);
                    }

                    // Process Active Incomes if flag is true
                    if (includeActive) {
                        const scheduledActive = activeIncomes.filter(a => Number(a.year) * 12 === m);
                        const activeThisMonth = scheduledActive.reduce((sum, a) => sum + Number(a.amount), 0);
                        if (activeThisMonth > 0) {
                             const afterTfsa = fillTFSAs(activeThisMonth);
                             taxableCash += afterTfsa;
                             activeIncomeThisMonth = activeThisMonth;
                        }
                    }
                    cumulativeActiveIncome += activeIncomeThisMonth;

                    if (m > 0 && currentHomeValue > 0) currentHomeValue *= (1 + monthlyAppreciation);

                    // --- Recalibration override ---
                    if (enableRebase && m === Number(rebaseYear) * 12) {
                        // Override balances

                                    <div className="bg-white p-4 rounded-xl border shadow-sm card-hover relative"><div className="stat-accent-bar bg-violet-500"></div><div className="pl-5"><div className="text-xs font-semibold text-slate-500 uppercase">Monthly Income</div><p className="text-xl font-bold text-violet-600">${finalMonth.totalMonthlyIncome?.toLocaleString()}/mo</p></div></div>
                                    <div className="bg-white p-4 rounded-xl border shadow-sm card-hover relative"><div className="stat-accent-bar bg-emerald-500"></div><div className="pl-5 flex flex-col items-start gap-1"><div className="flex items-center gap-2"><div className="text-xs font-semibold text-slate-500 uppercase">Final Net Worth</div>{finalHustleBoost > 0 && <span className="text-[10px] bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded font-bold">+{finalHustleBoost.toLocaleString()} RE Boost</span>}</div><p className="text-xl font-bold text-emerald-600">${finalMonth.totalNetWorth?.toLocaleString()}</p></div></div>
                                    <div className="bg-white p-4 rounded-xl border shadow-sm card-hover relative bg-blue-50/30"><div className="stat-accent-bar bg-blue-500"></div><div className="pl-5"><div className="text-xs font-semibold text-blue-600 uppercase">Home Equity</div><p className="text-xl font-bold text-blue-700">${finalMonth.equity?.toLocaleString()}</p></div></div>
                                </div>
                                <div className="bg-white rounded-2xl p-4 sm:p-6 shadow-sm border border-slate-100 flex flex-col">
                                    <div className="flex justify-between items-center border-b pb-4 mb-4">
                                        <h2 className="text-lg font-bold">{loanType==='nomad' ? '🗺️ Master Strategy Timeline' : '📈 Wealth Progression'} (30 Years)</h2>
                                        <div className="flex gap-2 text-xs">
                                            <button onClick={()=>{setChartDomainLeft(0);setChartDomainRight(30)}} className="px-3 py-1.5 rounded-lg bg-slate-100 hover:bg-slate-200 font-semibold">Full</button>
                                            <button onClick={()=>{setChartDomainLeft(0);setChartDomainRight(10)}} className="px-3 py-1.5 rounded-lg bg-slate-100 hover:bg-slate-200 font-semibold">10 Yr</button>
                                        </div>
                                    </div>
                                    <div className="h-[400px]">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <ComposedChart data={simulationData} margin={{top:10,right:10,left:0,bottom:20}} onMouseMove={(e)=>{if(e?.activePayload?.length) setHoveredData(e.activePayload[0].payload)}} onMouseLeave={()=>setHoveredData(null)}>
                                                <defs>
                                                    <linearGradient id="equityGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#3B82F6" stopOpacity={0.25}/><stop offset="100%" stopColor="#3B82F6" stopOpacity={0.05}/></linearGradient>
                                                    <linearGradient id="debtGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#EF4444" stopOpacity={0.3}/><stop offset="100%" stopColor="#EF4444" stopOpacity={0.05}/></linearGradient>
                                                    <linearGradient id="liquidGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#0D9488" stopOpacity={0.2}/><stop offset="100%" stopColor="#0D9488" stopOpacity={0.02}/></linearGradient>
                                                </defs>
                                                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#E2E8F0" />
                                                <XAxis dataKey="year" tick={<CustomXAxisTick/>} tickCount={7} domain={[chartDomainLeft, chartDomainRight]} type="number" height={40}/>
                                                <YAxis yAxisId="left" tickFormatter={t=>`$${(t/1000).toFixed(0)}k`} tick={{fontSize:11}} width={60}/>
                                                {loanType==='nomad' && <YAxis yAxisId="right" orientation="right" tickFormatter={t=>`$${(t/1000).toFixed(0)}k`} tick={{fontSize:11,fill:'#9333ea'}} width={55}/>}
                                                <RechartsTooltip content={({active,payload})=>{
                                                    if(active&&payload?.length){
                                                        const d=payload[0].payload;
                                                        return(
                                                            <div className="bg-white/98 backdrop-blur-md p-0 rounded-2xl shadow-2xl min-w-[260px] border border-slate-100 overflow-hidden">
                                                                <div className="bg-gradient-to-r from-indigo-500 to-violet-500 px-4 py-3"><p className="font-bold text-white text-sm">Year {d.displayYear}, Month {d.displayMonth} · Age {d.age}</p></div>
                                                                <div className="p-4 space-y-2">
                                                                    {d.isDownsizeMonth&&<div className="mb-2 bg-indigo-50 text-indigo-700 p-2.5 rounded-lg text-xs flex items-center gap-1.5"><Icon name="MapPin" size={14}/> {loanType==='nomad'?'🏡 Re-Entry: Bought Downsized Home!':'🏡 Downsize Event — Debt Cleared!'}</div>}
                                                                    {d.isExitMonth&&<div className="mb-2 bg-emerald-50 text-emerald-700 p-2.5 rounded-lg text-xs flex items-center gap-1.5"><Icon name="Landmark" size={14}/> Home Sold! Equity Cashed Out.</div>}
                                                                    {d.activeIncomeThisMonth>0&&<div className="mb-2 bg-emerald-100 text-emerald-800 font-bold p-2.5 rounded-lg text-xs flex justify-between items-center"><span className="flex items-center gap-1.5"><Icon name="DollarSign" size={14}/> Active Income:</span><span>+ ${d.activeIncomeThisMonth.toLocaleString()}</span></div>}
                                                                    <div className="space-y-1.5 text-sm">
                                                                        {d.homeValue>0&&<p className="flex justify-between text-blue-600"><span>Home Equity:</span><span className="font-semibold">${d.equity.toLocaleString()}</span></p>}
                                                                        {d.balance>0&&<p className="flex justify-between text-rose-500"><span>Loan Debt:</span><span className="font-semibold">${d.balance.toLocaleString()}</span></p>}
                                                                        {d.tfsaBalance>0&&<p className="flex justify-between text-teal-600"><span>💧 Liquid Wealth:</span><span className="font-semibold">${d.tfsaBalance.toLocaleString()}</span></p>}
                                                                        <div className="border-t pt-2 mt-1"><p className="flex justify-between text-slate-800 font-bold"><span>Net Worth:</span><span>${d.totalNetWorth.toLocaleString()}</span></p></div>
                                                                    </div>
                                                                    {loanType==='nomad'&&d.month>0&&<div className="mt-3 pt-3 border-t"><p className="text-xs font-bold text-slate-500 uppercase mb-2">💰 Monthly Cash Flow</p><div className="space-y-1 text-xs"><p className="flex justify-between"><span>Pensions:</span><span>${d.monthlyPensionTotal.toLocaleString()}</span></p><p className="flex justify-between text-indigo-600"><span>OAS (net):</span><span>${d.monthlyOasNet?.toLocaleString()}</span></p><p className="flex justify-between text-teal-600"><span>Yield (after tax):</span><span>${d.monthlyDividendIncome.toLocaleString()}</span></p><div className="border-t pt-1.5 mt-1"><p className="flex justify-between text-violet-700 font-bold text-sm"><span>Usable Cash:</span><span>${d.totalMonthlyIncome.toLocaleString()}/mo</span></p></div></div></div>}
                                                                </div>
                                                            </div>
                                                        );
                                                    }
                                                    return null;
                                                }}/>
                                                <Legend verticalAlign="top" height={36} iconType="circle" wrapperStyle={{fontSize:12,fontWeight:600}}/>
                                                <Area yAxisId="left" type="monotone" dataKey="balance" stackId="debtEquity" stroke="#EF4444" strokeWidth={1.5} fill="url(#debtGrad)" name="RM Debt" isAnimationActive={false}/>
                                                <Area yAxisId="left" type="monotone" dataKey="equity" stackId="debtEquity" stroke="#3B82F6" strokeWidth={2} fill="url(#equityGrad)" name="Home Equity" isAnimationActive={false}/>
                                                <Area yAxisId="left" type="monotone" dataKey="tfsaBalance" stroke="#0D9488" strokeWidth={2} fill="url(#liquidGrad)" name="Liquid Wealth" isAnimationActive={false}/>
                                                {loanType==='nomad'&&<Line yAxisId="right" type="monotone" dataKey="totalMonthlyIncome" stroke="#9333ea" strokeWidth={2.5} name="Monthly Income" dot={false} isAnimationActive={false}/>}
                                            </ComposedChart>
                                        </ResponsiveContainer>
                                    </div>
                                    {loanType === 'nomad' && activeData.cumulativeActiveIncome > 0 && (
                                        <div className="mt-4 p-4 bg-emerald-50 rounded-xl border border-emerald-200 shadow-sm flex items-center justify-between">
                                            <div className="flex items-center gap-3">
                                                <div className="w-10 h-10 rounded-full bg-emerald-100 flex items-center justify-center"><Icon name="TrendingUp" size={20} className="text-emerald-600" /></div>
                                                <div>
                                                    <h4 className="text-sm font-bold text-emerald-800">The Hustle Impact (Cumulative)</h4>
                                                    <p className="text-xs text-emerald-600">You've injected <strong>${activeData.cumulativeActiveIncome.toLocaleString()}</strong> of active RE income so far.</p>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                                <SharedDashboardCharts />
                            </div>
                        </div>
                    ) : (
                        <div className="space-y-5 animate-fade-in">
                            <div className="bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-900 rounded-2xl p-6 shadow-lg border border-indigo-900/40 text-white relative overflow-hidden">
                                <h2 className="text-2xl font-bold flex items-center gap-2 mb-2"><Icon name="Sparkles" size={26} className="text-amber-300" /> Dashboard Overview</h2>
                                <p className="text-slate-300 text-sm">Your Nomad Pivot at a glance, incorporating active commission years and scheduled lump sums.</p>
                            </div>
                            
                            <div className="grid grid-cols-2 lg:grid-cols-4 gap-3">
                                <div className="bg-white p-4 rounded-xl border shadow-sm relative"><div className="text-[11px] font-semibold text-slate-500 uppercase flex items-center gap-2">Final Net Worth {finalHustleBoost > 0 && <span className="bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded">+ RE Boost</span>}</div><p className="text-lg font-bold text-emerald-600">${(nomadFinal.totalNetWorth || 0).toLocaleString()}</p></div>
                                <div className="bg-white p-4 rounded-xl border shadow-sm"><div className="text-[11px] font-semibold text-slate-500 uppercase">Liquid Wealth</div><p className="text-lg font-bold text-teal-600">${(nomadFinal.tfsaBalance || 0).toLocaleString()}</p></div>
                                <div className="bg-white p-4 rounded-xl border shadow-sm"><div className="text-[11px] font-semibold text-slate-500 uppercase">Home Equity</div><p className="text-lg font-bold text-blue-600">${(nomadFinal.equity || 0).toLocaleString()}</p></div>
                                <div className="bg-white p-4 rounded-xl border shadow-sm"><div className="text-[11px] font-semibold text-slate-500 uppercase">Spent on Experiences</div><p className="text-lg font-bold text-amber-600">${totalExperienceBudget.toLocaleString()}</p></div>
                            </div>

                            <SharedDashboardCharts />
                        </div>
                    )}
                    <div className="text-center text-xs text-slate-400 pb-4">Simulator for educational purposes only. Not financial advice.</div>
                </div>
            </div>);
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
